arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
output-dir: lib/l10n/generated
supported-locales:
  - en
  - es
# Locale notes:
# - 'es' targets neutral Latin American Spanish (formal "usted" register).
# - Regional variants (es-MX, es-ES, es-AR) are not yet supported.
# - To add Spain-specific vocabulary, create app_es_ES.arb with
#   overrides for terms like "ordenador", "vale", "añadir", etc.
# - The locale resolution callback in lib/core/config/locale_config.dart
#   maps all Spanish variants to 'es'. See AppLocale.resolveLocale().
# - Adding a new locale: edit AppLocale enum in locale_config.dart only.
#   l10n.yaml, main.dart, and profile_screen.dart derive from it.
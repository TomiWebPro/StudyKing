name: studyking
description: "An adaptive learning platform for students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  xml: ^6.5.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.11
  meta: ^1.16.0

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.0

  # Storage
  path_provider: ^2.1.2
  path: ^1.9.1
  flutter_secure_storage: ^10.2.0

  # HTTP
  http: ^1.6.0

  # Date formatting
  intl: ^0.20.2

  # PDF generation
  pdf: ^3.10.4

  # UUID generation
  uuid: ^4.2.1

  # Image picker
  image_picker: ^1.0.7

  # File picker
  file_picker: ^7.0.2

  # Calendar
  table_calendar: ^3.0.9

  # Sharing
  share_plus: ^9.0.0

  # App version info
  package_info_plus: ^8.0.0

  # Notifications
  flutter_local_notifications: ^17.2.1

  # Cryptography
  crypto: ^3.0.3

  # Voice
  speech_to_text: ^6.6.2
  flutter_tts: ^4.2.0
  record: ^6.0.0
  encrypt: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.2
  leak_tracker_flutter_testing: ^3.0.10
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  coverage: ^1.15.0
  path_provider_platform_interface: ^2.1.1
  plugin_platform_interface: ^2.1.7

flutter:
  uses-material-design: true

  generate: true

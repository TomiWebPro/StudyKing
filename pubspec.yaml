name: studyking
description: "An adaptive learning platform for students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  vector_math: ^2.2.0

  # State Management
  flutter_riverpod: ^2.4.11

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.0

  # UI packages
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  # Storage
  path_provider: ^2.1.2

  # HTTP
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  leak_tracker_flutter_testing: ^3.0.10
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
